[General]
ipv6 = false
ipv6-vif = disabled
allow-wifi-access = false
allow-hotspot-access = false
udp-priority = true
udp-policy-not-supported-behaviour = DIRECT
disable-geoip-db-auto-update = false
use-local-host-item-for-proxy = false
dns-server = system

[Proxy Group]
Proxy = select, no-alert=0, hidden=0, include-all-proxies=0, include-other-group="中国香港, 美国, edgetunnel", icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/02ProxySoftLogo/Surge(8).png
Telegram = select, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/telegram(blue1).png, include-other-group="中国香港, 日本, 新加坡"
TikTok = select, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=日本, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/tiktok.png
Emby = select, DIRECT, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/emby.png, include-other-group="中国香港, 美国, 新加坡, 中国台湾, 日本"
哔哩哔哩 = select, DIRECT, no-alert=0, hidden=0, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/bilibili.png, persistent=0, include-other-group="中国台湾, 中国香港"
小红书 = select, DIRECT, no-alert=0, hidden=0, include-all-proxies=0, include-other-group="美国, 日本", icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/03CNSoft/xiaohongshu(1).png
YouTube = select, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=中国香港, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/youtube(4).png
SNTP = select, no-alert=0, hidden=0, include-all-proxies=0, include-other-group="中国香港, 美国", icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/emby/shouhou(10)SNTP-emby.png
AI = select, no-alert=0, hidden=0, include-all-proxies=0, include-other-group="美国, 日本, 中国台湾", icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/claude.png
币安 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=新加坡, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/bian.png
欧易 = smart, no-alert=0, hidden=0, include-all-proxies=0, include-other-group=新加坡, icon-url=https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/04ProxySoft/okx(1).png
中国香港 = select, policy-regex-filter="(?i)(🇭🇰|香港|Hong\s?Kong|\bHK(?:[-_]?\d{1,3})?\b)", no-alert=0, hidden=0, include-all-proxies=0, include-other-group="阿拉丁, "Super Flash"", icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png
中国台湾 = select, policy-regex-filter="(?i)(🇹🇼|台湾|台灣|Taiwan|Taipei|\bTW(?:[-_]?\d{1,3})?\b)", no-alert=0, hidden=0, include-all-proxies=0, include-other-group=阿拉丁, icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png
美国 = select, policy-regex-filter="(?i)(🇺🇸|美国|United\s?States|America|Los\s?Angeles|New\s?York|\bUS(?:[-_]?\d{1,3})?\b)", no-alert=0, hidden=0, include-all-proxies=0, include-other-group="阿拉丁, edgetunnel", icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/United_States.png
日本 = select, policy-regex-filter="(?i)(🇯🇵|日本|Japan|Tokyo|Osaka|\bJP(?:[-_]?\d{1,3})?\b)", no-alert=0, hidden=0, include-all-proxies=0, include-other-group="阿拉丁, edgetunnel, "Super Flash"", icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png
新加坡 = select, policy-regex-filter="(?i)(🇸🇬|新加坡|Singapore|\bSG(?:[-_]?\d{1,3})?\b)", no-alert=0, hidden=0, include-all-proxies=0, include-other-group="阿拉丁, edgetunnel", icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png

[Rule]
RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/XiaoHongShu/XiaoHongShu.list,小红书,extended-matching
